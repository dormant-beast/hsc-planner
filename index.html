  const totalChapters = allChapters.length;
  const totalTasks = totalChapters * 3;

  // ৬ সপ্তাহে অধ্যায় বিতরণ
  function distributeChaptersToWeeks(numWeeks = 6) {
    const subjects = [...new Set(allChapters.map(c => c.subject))];
    const subjectIndices = {};
    subjects.forEach(sub => { subjectIndices[sub] = []; });
    for (let i = 0; i < allChapters.length; i++) {
      subjectIndices[allChapters[i].subject].push(i);
    }
    const targetPerWeekPerSubject = {};
    subjects.forEach(sub => {
      const total = subjectIndices[sub].length;
      const base = Math.floor(total / numWeeks);
      const rem = total % numWeeks;
      targetPerWeekPerSubject[sub] = Array(numWeeks).fill(base);
      for (let i = 0; i < rem; i++) targetPerWeekPerSubject[sub][i]++;
    });
    const weeks = [];
    for (let w = 0; w < numWeeks; w++) weeks.push({ id: w+1, label: `সপ্তাহ ${w+1}`, chapterIndices: [] });
    for (let sub of subjects) {
      const indices = [...subjectIndices[sub]];
      let pos = 0;
      for (let w = 0; w < numWeeks; w++) {
        const need = targetPerWeekPerSubject[sub][w];
        for (let i = 0; i < need; i++) {
          if (pos < indices.length) weeks[w].chapterIndices.push(indices[pos++]);
        }
      }
    }
    weeks.forEach(w => w.chapterIndices.sort((a,b)=>a-b));
    weeks.forEach((w, idx) => w.color = `hsl(${200 + (idx+1)*25}, 70%, 48%)`);
    return weeks;
  }
  const weeks = distributeChaptersToWeeks(6);

  let currentUser = null;        // Firebase user object (member)
  let isAdmin = false;
  let viewingUserId = null;
  let activeWeek = null;
  let currentSubject = 'all';

  // ডাটাবেস থেকে ইউজারের প্রোফাইল নাম আনা
  async function getUserNickname(uid) {
    const snap = await db.ref(`users/${uid}/info/nickname`).once('value');
    return snap.val();
  }
  // প্রোফাইল নাম সেট করা
  function setUserNickname(uid, nickname) {
    return db.ref(`users/${uid}/info`).update({ nickname: nickname, displayName: nickname });
  }

  // মেনুতে প্রোফাইল অংশ আপডেট করা
  async function updateProfileDisplay(user) {
    const profileDiv = document.getElementById('profileDisplay');
    if (!user) { profileDiv.innerHTML = '👤 লগইন নেই'; return; }
    const nickname = await getUserNickname(user.uid);
    if (nickname) {
      profileDiv.innerHTML = `👤 ${nickname}`;
    } else {
      profileDiv.innerHTML = `👤 ${user.displayName || user.email}`;
    }
  }

  // নাম পরিবর্তনের ফাংশন
  async function changeNickname(user) {
    const currentNick = await getUserNickname(user.uid);
    const newName = prompt('আপনার পছন্দের নাম (নিকনেম) লিখুন:', currentNick || user.displayName || user.email);
    if (newName && newName.trim()) {
      await setUserNickname(user.uid, newName.trim());
      await updateProfileDisplay(user);
      // অ্যাডমিন তালিকা রিফ্রেশ করতে হবে যদি অ্যাডমিন লগইন করে থাকে
      if (isAdmin) loadAllUsersAndRenderList();
      alert('আপনার নাম সেভ হয়েছে!');
    }
  }

  // রেন্ডার প্ল্যানার (আগের মতো)
  function getSubjectColor(subject) {
    if (subject.includes("পদার্থবিজ্ঞান")) return { bg: "#dbeafe", text: "#1e3a8a", border: "#3b82f6" };
    if (subject.includes("রসায়ন")) return { bg: "#fce7f3", text: "#9d174d", border: "#ec4899" };
    if (subject.includes("জীববিজ্ঞান")) return { bg: "#dcfce7", text: "#166534", border: "#22c55e" };
    if (subject.includes("উচ্চতর গণিত")) return { bg: "#fed7aa", text: "#9a3412", border: "#f97316" };
    if (subject.includes("তথ্য ও যোগাযোগ প্রযুক্তি")) return { bg: "#cffafe", text: "#075985", border: "#06b6d4" };
    return { bg: "#f1f5f9", text: "#334155", border: "#94a3b8" };
  }
  function defaultTaskState() {
    let state = {};
    for (let i = 0; i < totalChapters; i++) state[`${i}_cq`] = state[`${i}_mcq`] = state[`${i}_kokh`] = false;
    return state;
  }
  function updateProgress(tasks) {
    let done = 0;
    for (let i = 0; i < totalChapters; i++) {
      if (tasks[`${i}_cq`]) done++;
      if (tasks[`${i}_mcq`]) done++;
      if (tasks[`${i}_kokh`]) done++;
    }
    let percent = Math.round((done / totalTasks) * 100);
    document.getElementById('pgBar').style.width = percent + '%';
    document.getElementById('pgTxt').innerHTML = `${done} / ${totalTasks} টাস্ক সম্পন্ন (${percent}%)`;
    document.getElementById('totalTaskDisplay').innerHTML = `📋 Total Task = ${totalTasks}`;
  }
  function renderPlanner(tasks, readOnly = false) {
    const container = document.getElementById('plannerContainer');
    container.innerHTML = '';
    if (!tasks) return;
    if (isAdmin && viewingUserId) {
      const banner = document.createElement('div');
      banner.className = 'viewing-banner';
      banner.innerHTML = `👁️ <strong>বর্তমানে দেখছেন: ${viewingUserId}</strong> (শুধুমাত্র দেখার মোড)`;
      container.appendChild(banner);
    }
    for (let week of weeks) {
      if (activeWeek !== null && activeWeek !== week.id) continue;
      let weekIndices = week.chapterIndices.filter(idx => currentSubject === 'all' || allChapters[idx].subject === currentSubject);
      if (weekIndices.length === 0) continue;
      const weekDiv = document.createElement('div');
      weekDiv.style.marginBottom = '28px';
      const header = document.createElement('div');
      header.style.cssText = `display:flex; align-items:center; gap:12px; background:${week.color}; padding:10px 18px; border-radius:20px; color:white; margin-bottom:14px; font-weight:bold;`;
      let completed = weekIndices.filter(idx => tasks[`${idx}_cq`] && tasks[`${idx}_mcq`] && tasks[`${idx}_kokh`]).length;
      header.innerHTML = `<span style="background:rgba(255,255,255,0.2); padding:2px 12px; border-radius:30px;">${week.label}</span><span>সপ্তাহ ${week.id}</span><span style="margin-left:auto;">${completed}/${weekIndices.length} কাজ সম্পূর্ণ</span>`;
      weekDiv.appendChild(header);
      for (let idx of weekIndices) {
        const chap = allChapters[idx];
        const color = getSubjectColor(chap.subject);
        const card = document.createElement('div');
        card.className = 'task-card';
        card.style.borderLeftColor = color.border;
        card.innerHTML = `
          <div class="task-header"><span class="task-number">কাজ ${idx+1}</span><span class="subject-badge" style="background:${color.bg}; color:${color.text}">${chap.subject}</span></div>
          <div class="chapter-name"><span>📘 ${chap.chapter}</span>${(tasks[`${idx}_cq`] && tasks[`${idx}_mcq`] && tasks[`${idx}_kokh`]) ? '<span class="complete-badge">✓ সম্পূর্ণ অধ্যায়</span>' : ''}</div>
          <div class="segments" id="seg-${idx}"></div>
        `;
        weekDiv.appendChild(card);
        const segDiv = card.querySelector(`#seg-${idx}`);
        const makeSegment = (label, key) => {
          const div = document.createElement('div');
          div.className = 'seg-item';
          const chk = document.createElement('input');
          chk.type = 'checkbox';
          chk.checked = tasks[key];
          if (readOnly) chk.disabled = true;
          if (!readOnly && !isAdmin) {
            chk.addEventListener('change', () => {
              tasks[key] = chk.checked;
              db.ref(`users/${currentUser.uid}/tasks`).set(tasks);
              renderPlanner(tasks, false);
            });
          }
          const lbl = document.createElement('span');
          lbl.innerText = label;
          div.appendChild(chk); div.appendChild(lbl);
          return div;
        };
        segDiv.appendChild(makeSegment('CQ (সৃজনশীল)', `${idx}_cq`));
        segDiv.appendChild(makeSegment('MCQ (বহুনির্বাচনি)', `${idx}_mcq`));
        segDiv.appendChild(makeSegment('কখ (ক-খ অংশ)', `${idx}_kokh`));
        if (readOnly) card.style.opacity = '0.8';
      }
      container.appendChild(weekDiv);
    }
    updateProgress(tasks);
  }

  async function loadMemberTasks(user) {
    if (!user) return;
    const snap = await db.ref(`users/${user.uid}/tasks`).once('value');
    let tasks = snap.val();
    if (!tasks) tasks = defaultTaskState();
    renderPlanner(tasks, false);
    // ইউজার ইনফো সেভ (নিকনেম থাকলে সেটা রেখে, না থাকলে গুগল নাম)
    const infoSnap = await db.ref(`users/${user.uid}/info`).once('value');
    const info = infoSnap.val() || {};
    if (!info.nickname) {
      // প্রথমবার লগইন, গুগলের নাম সেভ করে রাখি
      await db.ref(`users/${user.uid}/info`).update({
        email: user.email,
        googleName: user.displayName || user.email,
        lastLogin: Date.now()
      });
    } else {
      await db.ref(`users/${user.uid}/info`).update({ lastLogin: Date.now() });
    }
    await updateProfileDisplay(user);
  }

  async function loadAllUsersAndRenderList() {
    if (!isAdmin) return;
    const snap = await db.ref('users').once('value');
    const users = snap.val() || {};
    const container = document.getElementById('adminUserListContainer');
    container.style.display = 'block';
    const userIds = Object.keys(users);
    if (userIds.length === 0) { container.innerHTML = '<p style="color:white;">কোনো সদস্য নেই</p>'; return; }
    let html = '表<tr><thead><tr><th>নাম / নিকনেম</th><th>সম্পন্ন টাস্ক</th><th>মোট</th><th>অগ্রগতি</th><th></th></tr></thead><tbody>';
    for (let uid of userIds) {
      const info = users[uid]?.info || {};
      let displayName = info.nickname || info.googleName || info.email || uid;
      let tasks = users[uid]?.tasks || {};
      let done = 0;
      for (let i = 0; i < totalChapters; i++) {
        if (tasks[`${i}_cq`]) done++;
        if (tasks[`${i}_mcq`]) done++;
        if (tasks[`${i}_kokh`]) done++;
      }
      let percent = Math.round((done / totalTasks) * 100);
      html += `<tr><td>${displayName}</td><td>${done}</td><td>${totalTasks}</td><td>${percent}%</td><td><button class="view-user-btn" data-uid="${uid}">দেখুন</button></td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
    document.querySelectorAll('.view-user-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const uid = btn.getAttribute('data-uid');
        viewingUserId = uid;
        db.ref(`users/${uid}/tasks`).once('value', snap => {
          renderPlanner(snap.val() || defaultTaskState(), true);
        });
        document.getElementById('adminStatus').innerHTML = `👁️ দেখছেন: ${uid} | `;
        container.style.display = 'none';
      });
    });
  }

  // মেনু টগল
  const menuBtn = document.getElementById('menuBtn');
  const dropdown = document.getElementById('dropdownMenu');
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('show');
  });
  document.addEventListener('click', function(e) {
    if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');
  });
  document.getElementById('menuLogoutBtn').addEventListener('click', () => {
    if (isAdmin) {
      isAdmin = false;
      currentUser = null;
      viewingUserId = null;
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('adminUserListContainer').style.display = 'none';
      document.getElementById('memberControls').style.display = 'none';
      document.getElementById('loginPanel').style.display = 'flex';
      document.getElementById('plannerContainer').innerHTML = '';
      document.getElementById('pgBar').style.width = '0%';
      document.getElementById('pgTxt').innerHTML = '0%';
      menuBtn.classList.add('hidden');
    } else {
      auth.signOut();
    }
    dropdown.classList.remove('show');
  });
  document.getElementById('editNameBtn').addEventListener('click', () => {
    if (currentUser && !isAdmin) {
      changeNickname(currentUser);
    } else if (isAdmin) {
      alert('অ্যাডমিন মোডে নাম পরিবর্তন করতে পারেন না।');
    } else {
      alert('লগইন করুন প্রথমে');
    }
  });

  // গুগল সাইন-ইন
  document.getElementById('googleSignInBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(err => alert('লগইন ব্যর্থ: '+err.message));
  });
  // অ্যাডমিন লগইন
  document.getElementById('adminLoginBtn').addEventListener('click', async () => {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd !== 'dormant2025') { alert('ভুল পাসওয়ার্ড'); return; }
    await auth.signOut(); // সাইন আউট করে
    isAdmin = true;
    currentUser = null;
    viewingUserId = null;
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminPanel').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    document.getElementById('memberControls').style.display = 'none';
    document.getElementById('adminUserListContainer').style.display = 'block';
    document.getElementById('plannerContainer').innerHTML = '<div style="text-align:center;padding:40px;">👑 অ্যাডমিন মোড: তালিকা থেকে দেখুন</div>';
    await loadAllUsersAndRenderList();
    menuBtn.classList.remove('hidden');
    document.getElementById('profileDisplay').innerHTML = '👑 অ্যাডমিন';
  });

  // লগআউট বাটন (পুরনো)
  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (isAdmin) {
      isAdmin = false;
      currentUser = null;
      viewingUserId = null;
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('adminUserListContainer').style.display = 'none';
      document.getElementById('memberControls').style.display = 'none';
      document.getElementById('loginPanel').style.display = 'flex';
      document.getElementById('plannerContainer').innerHTML = '';
      document.getElementById('pgBar').style.width = '0%';
      document.getElementById('pgTxt').innerHTML = '0%';
      menuBtn.classList.add('hidden');
    } else {
      auth.signOut();
    }
  });

  // অথ স্টেট লিসেনার
  auth.onAuthStateChanged(async (user) => {
    if (user && !isAdmin) {
      currentUser = user;
      isAdmin = false;
      viewingUserId = null;
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('adminUserListContainer').style.display = 'none';
      document.getElementById('logoutBtn').classList.remove('hidden');
      document.getElementById('memberControls').style.display = 'flex';
      document.getElementById('memberHomeBtn').classList.remove('hidden');
      menuBtn.classList.remove('hidden');
      await loadMemberTasks(user);
    } else if (!user && !isAdmin) {
      currentUser = null;
      document.getElementById('loginPanel').style.display = 'flex';
      document.getElementById('memberControls').style.display = 'none';
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('logoutBtn').classList.add('hidden');
      document.getElementById('plannerContainer').innerHTML = '';
      document.getElementById('pgBar').style.width = '0%';
      document.getElementById('pgTxt').innerHTML = '0%';
      menuBtn.classList.add('hidden');
    }
  });

  // অন্যান্য ইভেন্ট
  document.getElementById('memberHomeBtn').addEventListener('click', () => {
    if (currentUser && !isAdmin) loadMemberTasks(currentUser);
  });
  document.getElementById('homeBtn').addEventListener('click', async () => {
    if (isAdmin) {
      viewingUserId = null;
      document.getElementById('plannerContainer').innerHTML = '<div style="text-align:center;padding:40px;">👑 অ্যাডমিন মোড: তালিকা থেকে দেখুন</div>';
      await loadAllUsersAndRenderList();
    }
  });
  document.getElementById('memberListBtn').addEventListener('click', async () => {
    if (isAdmin) {
      viewingUserId = null;
      document.getElementById('plannerContainer').innerHTML = '<div style="text-align:center;padding:40px;">👑 অ্যাডমিন মোড: তালিকা থেকে দেখুন</div>';
      await loadAllUsersAndRenderList();
    }
  });
  document.getElementById('roleSelect').addEventListener('change', (e) => {
    const isAdminRole = e.target.value === 'admin';
    document.getElementById('memberLoginArea').classList.toggle('hidden', isAdminRole);
    document.getElementById('adminLoginArea').classList.toggle('hidden', !isAdminRole);
  });
  document.getElementById('subjectFilter').addEventListener('change', (e) => {
    currentSubject = e.target.value;
    if (currentUser && !isAdmin) loadMemberTasks(currentUser);
    else if (isAdmin && viewingUserId) db.ref(`users/${viewingUserId}/tasks`).once('value', snap => renderPlanner(snap.val() || defaultTaskState(), true));
  });
  function buildWeekButtons() {
    const btnContainer = document.getElementById('weekButtons');
    btnContainer.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'fbtn active';
    allBtn.innerText = 'সব সপ্তাহ';
    allBtn.onclick = () => { activeWeek = null; if(currentUser && !isAdmin) loadMemberTasks(currentUser); else if(isAdmin && viewingUserId) db.ref(`users/${viewingUserId}/tasks`).once('value', snap => renderPlanner(snap.val()||defaultTaskState(), true)); updateActiveButton(allBtn); };
    btnContainer.appendChild(allBtn);
    weeks.forEach(w => {
      const btn = document.createElement('button');
      btn.className = 'fbtn';
      btn.innerText = w.label;
      btn.onclick = () => {
        activeWeek = (activeWeek === w.id) ? null : w.id;
        if(currentUser && !isAdmin) loadMemberTasks(currentUser);
        else if(isAdmin && viewingUserId) db.ref(`users/${viewingUserId}/tasks`).once('value', snap => renderPlanner(snap.val()||defaultTaskState(), true));
        updateActiveButton(btn);
      };
      btnContainer.appendChild(btn);
    });
    function updateActiveButton(activeBtn) {
      document.querySelectorAll('#weekButtons .fbtn').forEach(b => b.classList.remove('active'));
      if (activeWeek === null) allBtn.classList.add('active');
      else activeBtn.classList.add('active');
    }
  }
  buildWeekButtons();
  document.getElementById('exportAllDataBtn').addEventListener('click', async () => {
    if (!isAdmin) return;
    const snap = await db.ref('users').once('value');
    const blob = new Blob([JSON.stringify(snap.val() || {}, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `hsc_users_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
  });
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], {type: 'text/html'});
    const a = document.createElement('a');
    a.download = 'HSC_Planner_ProfileName.html';
    a.href = URL.createObjectURL(blob);
    a.click();
  });
</script>
</body>
</html>
