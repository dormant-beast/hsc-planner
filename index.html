<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin View Fixed | DORMANT BEAST</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0b1120; font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(8px); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    button { transition: all 0.2s; }
    button:hover { transform: scale(1.02); }
  </style>
</head>
<body class="text-white p-4">

<div class="max-w-6xl mx-auto">
  <!-- Header -->
  <div class="flex justify-between items-center mb-6 glass p-4 rounded-2xl">
    <h1 class="text-2xl font-bold text-yellow-400">DORMANT BEAST</h1>
    <div id="userInfo" class="flex gap-3"></div>
  </div>

  <!-- Login Panel -->
  <div id="loginBox" class="glass max-w-md mx-auto p-6 text-center">
    <h2 class="text-2xl mb-2">Welcome</h2>
    <select id="role" class="bg-black/50 border border-white/20 rounded-full px-4 py-2 mb-3">
      <option value="member">📖 Member (Google)</option>
      <option value="admin">👑 Admin</option>
    </select>
    <div id="memberLoginDiv">
      <button id="googleBtn" class="bg-yellow-500 text-black font-bold w-full py-2 rounded-full">🔐 Sign in with Google</button>
    </div>
    <div id="adminLoginDiv" class="hidden">
      <input type="password" id="adminPwd" placeholder="Admin password" class="w-full bg-black/50 border border-white/20 rounded-full px-4 py-2 mb-2">
      <button id="adminLoginBtn" class="bg-white/20 w-full py-2 rounded-full">Login as Admin</button>
    </div>
  </div>

  <!-- Admin Panel (hidden initially) -->
  <div id="adminPanel" class="hidden mt-6">
    <div class="flex gap-3 mb-4">
      <button id="showMembersBtn" class="bg-white/10 px-4 py-2 rounded-full">📋 Members</button>
      <button id="exportBtn" class="bg-white/10 px-4 py-2 rounded-full">📁 Export JSON</button>
    </div>
    <div id="memberList" class="glass p-4 overflow-x-auto"></div>
  </div>

  <!-- Planner View (for members and admin viewing) -->
  <div id="plannerView" class="hidden mt-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold" id="viewingTitle">Study Planner</h2>
      <button id="closePlannerBtn" class="bg-red-500/50 px-3 py-1 rounded-full text-sm">✖ Close</button>
    </div>
    <div id="plannerContent" class="glass p-4 space-y-4"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCKAI1QVzRvOHYlhUWo2LE-82zoFI2bmJ0",
    authDomain: "hsc-planner-1b02f.firebaseapp.com",
    databaseURL: "https://hsc-planner-1b02f-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "hsc-planner-1b02f",
    storageBucket: "hsc-planner-1b02f.firebasestorage.app",
    messagingSenderId: "272554996476",
    appId: "1:272554996476:web:931813d9ae94c1bba41d79"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  let currentUser = null;
  let isAdmin = false;
  let viewingUserId = null;

  // ---------- অধ্যায়ের ডাটা (শুধু ৭৮টি অধ্যায়ের নাম, ৬ সপ্তাহে ভাগ) ----------
  const chapters = [
    "Thermodynamics", "Static Electricity", "Current Electricity", "Magnetic Effect of Current", "Electromagnetic Induction",
    "Geometrical Optics", "Physical Optics", "Introduction to Modern Physics", "Atomic Models & Nuclear Physics", "Semiconductors & Electronics",
    "Vectors", "Dynamics", "Newtonian Mechanics", "Work Power Energy", "Gravitation", "Properties of Matter", "Circular Motion", "Waves", "Kinetic Theory of Gases",
    "Qualitative Chemistry", "Periodic Properties & Chemical Bonding", "Chemical Changes", "Applied Chemistry",
    "Environmental Chemistry", "Organic Chemistry", "Quantitative Chemistry", "Electrochemistry", "Economic Chemistry",
    "Cell & Its Structure", "Cell Division", "Cell Chemistry", "Microorganisms", "Algae & Fungi", "Bryophyta & Pteridophyta", "Gymnosperms & Angiosperms", "Tissue & Tissue System", "Plant Physiology", "Plant Breeding", "Biotechnology", "Ecology & Conservation",
    "Animal Diversity & Classification", "Introduction to Animals", "Digestion & Absorption", "Blood & Circulation", "Respiration & Breathing", "Excretion", "Movement & Locomotion", "Coordination & Control", "Human Continuity", "Human Defense", "Genetics & Evolution", "Animal Behavior",
    "Matrices & Determinants", "Vectors", "Straight Lines", "Circles", "Permutation & Combination", "Trigonometric Ratios", "Trigonometric Ratios of Compound Angles", "Functions & Graphs", "Differentiation", "Integration",
    "Real Numbers & Inequalities", "Linear Programming", "Complex Numbers", "Polynomials & Equations", "Binomial Expansion", "Conics", "Inverse Trigonometry", "Statics", "Dynamics of a Particle", "Probability & Statistics",
    "Bangladesh & Global Context", "Communication Systems & Networking", "Number System & Digital Devices", "Web Design & HTML", "Programming Languages", "Database Management System"
  ];
  const totalChapters = chapters.length; // 78
  // 6 সপ্তাহে ভাগ (প্রতি সপ্তাহে ১৩টি)
  const weeks = [];
  for (let i = 0; i < 6; i++) {
    weeks.push({ id: i+1, start: i*13, end: (i+1)*13 - 1 });
  }

  // ডিফল্ট টাস্ক স্টেট
  function defaultTasks() {
    let tasks = {};
    for (let i = 0; i < totalChapters; i++) {
      tasks[`${i}_cq`] = false;
      tasks[`${i}_mcq`] = false;
      tasks[`${i}_kokh`] = false;
    }
    return tasks;
  }

  // প্ল্যানার রেন্ডার (readOnly = true মানে শুধু দেখা, এডিট নয়)
  function renderPlanner(tasks, readOnly, userName) {
    const container = document.getElementById('plannerContent');
    container.innerHTML = '';
    if (!tasks) tasks = defaultTasks();
    document.getElementById('viewingTitle').innerText = `📘 ${userName}'s Study Progress`;
    
    for (let week of weeks) {
      const weekDiv = document.createElement('div');
      weekDiv.className = 'border border-white/10 rounded-xl p-3 mb-3';
      weekDiv.innerHTML = `<h3 class="font-bold text-yellow-400 mb-2">Week ${week.id}</h3><div class="grid gap-2" id="week-${week.id}"></div>`;
      container.appendChild(weekDiv);
      const weekContainer = weekDiv.querySelector(`#week-${week.id}`);
      
      for (let idx = week.start; idx <= week.end; idx++) {
        const chap = chapters[idx];
        const cqDone = tasks[`${idx}_cq`];
        const mcqDone = tasks[`${idx}_mcq`];
        const kokhDone = tasks[`${idx}_kokh`];
        
        const card = document.createElement('div');
        card.className = 'bg-white/5 rounded-lg p-2 flex flex-wrap justify-between items-center gap-2';
        card.innerHTML = `
          <div class="text-sm font-medium w-48">${idx+1}. ${chap}</div>
          <div class="flex gap-3">
            <label class="flex items-center gap-1 text-xs"><input type="checkbox" ${cqDone ? 'checked' : ''} ${readOnly ? 'disabled' : ''} data-idx="${idx}" data-type="cq"> CQ</label>
            <label class="flex items-center gap-1 text-xs"><input type="checkbox" ${mcqDone ? 'checked' : ''} ${readOnly ? 'disabled' : ''} data-idx="${idx}" data-type="mcq"> MCQ</label>
            <label class="flex items-center gap-1 text-xs"><input type="checkbox" ${kokhDone ? 'checked' : ''} ${readOnly ? 'disabled' : ''} data-idx="${idx}" data-type="kokh"> KOKH</label>
          </div>
        `;
        weekContainer.appendChild(card);
        
        // যদি readOnly না হয় (মেম্বার নিজে) তাহলে চেঞ্জ ইভেন্ট যোগ করি
        if (!readOnly && !isAdmin) {
          const chks = card.querySelectorAll('input');
          chks.forEach(chk => {
            chk.addEventListener('change', () => {
              tasks[`${idx}_${chk.dataset.type}`] = chk.checked;
              db.ref(`users/${currentUser.uid}/tasks`).set(tasks);
            });
          });
        }
      }
    }
  }

  // মেম্বার টাস্ক লোড
  async function loadMemberTasks(user) {
    const snap = await db.ref(`users/${user.uid}/tasks`).once('value');
    let tasks = snap.val() || defaultTasks();
    renderPlanner(tasks, false, user.displayName || user.email);
    // ইউজার ইনফো সেভ
    await db.ref(`users/${user.uid}/info`).set({
      email: user.email,
      displayName: user.displayName || user.email,
      lastLogin: Date.now()
    });
  }

  // অ্যাডমিনের জন্য সদস্য লিস্ট লোড
  async function loadMemberList() {
    const snap = await db.ref('users').once('value');
    const users = snap.val() || {};
    const container = document.getElementById('memberList');
    if (Object.keys(users).length === 0) {
      container.innerHTML = '<p class="text-center text-white/40">No members yet.</p>';
      return;
    }
    let html = '<table class="w-full text-sm"><thead><tr class="border-b border-white/20"><th>Name</th><th>Total Minutes</th><th>Tasks Completed</th><th>Action</th></tr></thead><tbody>';
    for (let uid in users) {
      const info = users[uid].info || {};
      const name = info.displayName || info.email || uid.slice(0,8);
      const totalMins = info.totalMinutes || 0;
      let tasks = users[uid].tasks || {};
      let done = 0;
      for (let i=0; i<totalChapters; i++) {
        if (tasks[`${i}_cq`]) done++;
        if (tasks[`${i}_mcq`]) done++;
        if (tasks[`${i}_kokh`]) done++;
      }
      html += `<tr class="border-b border-white/10"><td>${name}</td><td>${totalMins}</td><td>${done}/234</td><td><button class="viewUserBtn bg-yellow-500/30 px-2 py-1 rounded text-xs" data-uid="${uid}" data-name="${name}">View</button></td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
    // View বাটনে ক্লিক ইভেন্ট
    document.querySelectorAll('.viewUserBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const uid = btn.getAttribute('data-uid');
        const name = btn.getAttribute('data-name');
        viewingUserId = uid;
        const tasksSnap = await db.ref(`users/${uid}/tasks`).once('value');
        const tasks = tasksSnap.val() || defaultTasks();
        renderPlanner(tasks, true, name);
        document.getElementById('plannerView').classList.remove('hidden');
        document.getElementById('memberList').classList.add('hidden');
      });
    });
  }

  // ---------- লগইন কন্ট্রোল ----------
  document.getElementById('role').addEventListener('change', (e) => {
    const isAdminRole = e.target.value === 'admin';
    document.getElementById('memberLoginDiv').classList.toggle('hidden', isAdminRole);
    document.getElementById('adminLoginDiv').classList.toggle('hidden', !isAdminRole);
  });

  // গুগল লগইন
  document.getElementById('googleBtn').onclick = () => {
    auth.signInWithPopup(provider).then(async (result) => {
      currentUser = result.user;
      isAdmin = false;
      document.getElementById('loginBox').classList.add('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('plannerView').classList.remove('hidden');
      document.getElementById('userInfo').innerHTML = `<span>👋 ${currentUser.displayName}</span><button id="logoutBtn" class="bg-white/10 px-3 py-1 rounded-full text-sm">Logout</button>`;
      document.getElementById('logoutBtn').onclick = () => auth.signOut();
      await loadMemberTasks(currentUser);
    }).catch(err => alert(err.message));
  };

  // অ্যাডমিন লগইন
  document.getElementById('adminLoginBtn').onclick = () => {
    const pwd = document.getElementById('adminPwd').value;
    if (pwd === 'dormant2025') {
      isAdmin = true;
      currentUser = null;
      document.getElementById('loginBox').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
      document.getElementById('plannerView').classList.add('hidden');
      document.getElementById('userInfo').innerHTML = `<span>👑 Admin</span><button id="adminLogoutBtn" class="bg-white/10 px-3 py-1 rounded-full text-sm">Logout</button>`;
      document.getElementById('adminLogoutBtn').onclick = () => { location.reload(); };
      loadMemberList();
      document.getElementById('memberList').classList.remove('hidden');
    } else {
      alert('Wrong password');
    }
  };

  // অ্যাডমিন প্যানেলের বাটন
  document.getElementById('showMembersBtn').onclick = () => {
    loadMemberList();
    document.getElementById('memberList').classList.remove('hidden');
    document.getElementById('plannerView').classList.add('hidden');
  };
  document.getElementById('exportBtn').onclick = () => {
    db.ref('users').once('value', snap => {
      const data = snap.val() || {};
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `users_${Date.now()}.json`;
      a.click();
    });
  };
  document.getElementById('closePlannerBtn').onclick = () => {
    if (isAdmin) {
      document.getElementById('plannerView').classList.add('hidden');
      document.getElementById('memberList').classList.remove('hidden');
    } else {
      // মেম্বার প্ল্যানার বন্ধ করলে লগইন প্যানেলে ফিরে যেতে পারে
      auth.signOut();
    }
  };

  // লগআউট স্টেট
  auth.onAuthStateChanged(user => {
    if (!user && !isAdmin) {
      document.getElementById('loginBox').classList.remove('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('plannerView').classList.add('hidden');
      document.getElementById('userInfo').innerHTML = '';
    }
  });
</script>
</body>
</html>
